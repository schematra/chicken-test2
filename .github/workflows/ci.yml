name: CI

on:
  push:
  pull_request:

# The default GITHUB_TOKEN is read-only; the report step needs to create a
# check run, so grant it explicitly.
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CHICKEN Scheme
        run: sudo apt-get update && sudo apt-get install -y chicken-bin

      # `sudo` because the distro package's egg repository lives under
      # /var/lib/chicken, which is only writable by root.
      - name: Build and install egg
        run: sudo chicken-install

      # Run the egg's own test suite and capture a JUnit report.  `csi` runs
      # as the (unprivileged) runner so the file is ours to read; the egg is
      # installed system-wide and readable.  A non-zero exit (a real test
      # failure) fails the job.
      - name: Run self-test and capture JUnit XML
        run: |
          mkdir -p test-results
          TEST_XML=test-results/junit.xml csi -s tests/run.scm

      # Also produce the deliberately-mixed demo report (pass + fail + error)
      # purely as a downloadable artifact -- it is NOT fed to the reporter, so
      # it doesn't turn the commit's checks red.  `|| true`: it exits non-zero
      # by design.
      - name: Generate demo report (artifact only)
        if: always()
        run: TEST_XML=test-results/demo-mixed.xml csi -s examples/mixed.scm || true

      # Publish the self-test report as a GitHub check + summary
      # (tests run / passed / failed / skipped, with per-test detail).
      - name: Publish test report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: 'test-results/junit.xml'
          check_name: 'test2 self-test results'
          include_passed: true
          fail_on_failure: true

      # Keep the raw XML (self-test + demo) as downloadable artifacts.
      - name: Upload JUnit XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-xml
          path: test-results/
